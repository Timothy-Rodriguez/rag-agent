version: '3.8'
services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    ulimits:
      memlock: -1

  ollama:
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 16G
    environment:
      - OLLAMA_KEEP_ALIVE=24h

volumes:
  qdrant_data:
    driver: local
  ollama_data:
    driver: local